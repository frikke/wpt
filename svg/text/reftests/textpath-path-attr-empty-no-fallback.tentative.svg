<svg xmlns="http://www.w3.org/2000/svg" xmlns:html="http://www.w3.org/1999/xhtml" width="400" height="200"><title>Empty `path` attribute takes precedence over `href` and does not render</title><metadata><html:link href="mailto:viralipurbey@microsoft.com" rel="author" title="Virali Purbey"/><html:link href="https://svgwg.org/svg2-draft/text.html#TextPathElementPathAttribute" rel="help"/><html:link href="https://github.com/w3c/svgwg/issues/393" rel="help"/><html:link href="textpath-path-attr-empty-ref.tentative.svg" rel="match"/></metadata><defs><path id="curve" d="M 10 50 Q 100 10 200 50 T 390 50"/></defs><text fill="#000" font-size="20"><textPath href="#curve">Empty path</textPath></text></svg>