<svg xmlns="http://www.w3.org/2000/svg" xmlns:html="http://www.w3.org/1999/xhtml" width="500" height="500"><title>CSS width and height properties are ignored on symbol element</title><metadata><html:link href="mailto:dmangal@microsoft.com" rel="author" title="Divyansh Mangal"/><html:link href="https://svgwg.org/svg2-draft/struct.html#SymbolElement" rel="help"/><html:link href="https://svgwg.org/svg2-draft/struct.html#UseElement" rel="help"/><html:link href="https://github.com/w3c/svgwg/pull/1059" rel="help"/><html:link href="reference/green-100x100.svg" rel="match"/></metadata><defs><symbol id="sym" width="100" height="100" style="width:200px;height:200px"><rect width="400" height="400" fill="green"/></symbol></defs><use href="#sym"/></svg>