<svg xmlns="http://www.w3.org/2000/svg" xmlns:html="http://www.w3.org/1999/xhtml" width="500" height="500"><title>CSS width and height properties are ignored on use element when symbol has no dimensions</title><metadata><html:link href="mailto:viralipurbey@microsoft.com" rel="author" title="Virali Purbey"/><html:link href="https://w3c.github.io/svgwg/svg2-draft/struct.html#SymbolElement" rel="help"/><html:link href="https://w3c.github.io/svgwg/svg2-draft/struct.html#UseElement" rel="help"/><html:link href="https://github.com/w3c/svgwg/pull/1059" rel="help"/><html:link href="reference/green-100x100.svg" rel="match"/></metadata><defs><symbol id="sym"><rect width="400" height="400" fill="green"/></symbol></defs><use width="100" height="100" href="#sym" style="width:200px;height:200px"/></svg>